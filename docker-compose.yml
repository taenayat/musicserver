networks:
  music_net:
    driver: bridge

volumes:
  navidrome_data:

services:

  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    #user: "${PUID}:${PGID}"
    networks: [music_net]
    ports:
      - "4533:4533"
    environment:
      ND_LOGLEVEL: info
      ND_SCANSCHEDULE: 1m
      ND_SESSIONTIMEOUT: 24h
      ND_ENABLETRANSCODINGCONFIG: "true"
      ND_TRANSCODINGCACHESIZE: 1000MB
    volumes:
      - navidrome_data:/data
      - ./music:/music:ro
    deploy:
      resources:
        limits:
          memory: 256M

  gateway:
    build: ./gateway
    container_name: gateway
    restart: unless-stopped
    networks: [music_net]
    ports:
      - "4040:8080"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      NAVIDROME_URL:       http://navidrome:4533
      NAVIDROME_USER:      ${NAVIDROME_ADMIN_USER}
      NAVIDROME_PASS:      ${NAVIDROME_ADMIN_PASS}
      DEEZER_ARL:          ${DEEZER_ARL}
      DEEMIX_BITRATE:      ${DEEMIX_BITRATE:-320}
      MUSIC_DIR:           /music
      DB_PATH:             /data/gateway.db
      LOG_FILE:            /data/gateway.log
      GATEWAY_SECRET_KEY:  ${GATEWAY_SECRET_KEY}
      TELEGRAM_BOT_TOKEN:  ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
      YTDLP_ENABLED:       ${YTDLP_ENABLED:-true}
      CACHE_SIZE_GB:       ${CACHE_SIZE_GB:-20}
      CACHE_ENABLED:       ${CACHE_ENABLED:-false}
      CACHE_EVICTION_POLICY: ${CACHE_EVICTION_POLICY:-hybrid}
      CACHE_PIN_FAVORITES: ${CACHE_PIN_FAVORITES:-true}
      CACHE_PIN_RECENT_DAYS: ${CACHE_PIN_RECENT_DAYS:-7}
      CACHE_MIN_PLAY_COUNT: ${CACHE_MIN_PLAY_COUNT:-3}
      RADIO_ENABLED:       ${RADIO_ENABLED:-true}
      RADIO_TRACK_COUNT:   ${RADIO_TRACK_COUNT:-20}
      RADIO_TTL_HOURS:     ${RADIO_TTL_HOURS:-24}
      LYRICS_ENABLED:      ${LYRICS_ENABLED:-true}
      GENIUS_API_KEY:      ${GENIUS_API_KEY:-}
      LOG_LEVEL:           INFO
    volumes:
      - ./music:/music
      - ./data:/data
      - ./data/deemix:/root/.config/deemix
    depends_on:
      - navidrome
